name: Android Debug Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-debug-apks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build manager and driver debug APKs
        run: gradle :app-manager:assembleDebug :app-driver:assembleDebug

      - name: Upload app-manager debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-manager-debug
          path: app-manager/build/outputs/apk/debug/app-manager-debug.apk

      - name: Upload app-driver debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-driver-debug
          path: app-driver/build/outputs/apk/debug/app-driver-debug.apk
